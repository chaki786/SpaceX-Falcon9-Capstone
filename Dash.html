<html data-qb-installed="true"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8"><style>.dash-button {
    line-height: 32px;
    background: var(--Dash-Fill-Interactive-Weak);
    color: var(--Dash-Fill-Interactive-Strong);
    padding: 0 calc(var(--Dash-Spacing) * 2);
    border-radius: 4px;
    border: 1px solid var(--Dash-Fill-Interactive-Strong);
    box-sizing: border-box;
    vertical-align: middle;
    font-family: inherit;
    font-size: inherit;
}

/* Hover state - stronger background */
.dash-button:hover {
    cursor: pointer;
    background: var(--Dash-Fill-Inverse-Strong);
    color: var(--Dash-Fill-Interactive-Strong);
}

/* Active state (clicking) - inverted colors */
.dash-button:active {
    background: var(--Dash-Fill-Interactive-Strong);
    color: var(--Dash-Fill-Inverse-Strong);
}

/* Keyboard focus - inverted colors */
.dash-button:focus-visible {
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

/* Hover after keyboard focus - keep inverted but acknowledge hover */
.dash-button:focus-visible:hover {
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

/* Active state after keyboard focus - inverted colors */
.dash-button:focus-visible:active {
    background: var(--Dash-Fill-Interactive-Strong);
    color: var(--Dash-Fill-Inverse-Strong);
}

/* Disabled state */
.dash-button:disabled {
    opacity: 0.6;
    cursor: not-allowed;
    background: var(--Dash-Fill-Disabled);
    color: var(--Dash-Text-Strong);
    border-color: var(--Dash-Stroke-Weak);
}

.dash-input-container {
    position: relative;
    display: inline-flex;
    align-items: center;
    width: 100%;
    height: 34px;
    background: var(--Dash-Fill-Inverse-Strong);
    border-radius: var(--Dash-Spacing);
    border: 1px solid var(--Dash-Stroke-Strong);
    box-sizing: border-box;
    container-type: inline-size;
    vertical-align: middle;
    color: inherit;
    overflow: hidden;
}

.dash-input-container:focus-within {
    border: 1px solid var(--Dash-Fill-Interactive-Strong);
}

.dash-input-container:has(:focus-visible) {
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

.dash-input-container:has(.dash-input-element:disabled) {
    opacity: 0.6;
    cursor: not-allowed;
}

.dash-input-container input:focus {
    outline: none;
}

.dash-input-container:has(input[type='range']) {
    background: inherit;
}

/* Input field styles */
.dash-input-element {
    padding: var(--Dash-Spacing) calc(2 * var(--Dash-Spacing));
    color: inherit;
    background: inherit;
    border: none;
    border-radius: var(--Dash-Spacing);
    flex: 1 1 0;
    min-width: 0;
    height: 100%;
    box-sizing: border-box;
    z-index: 1;
    order: 2;
    accent-color: var(--Dash-Fill-Interactive-Strong);
    font-family: inherit;
    font-size: inherit;
}

.dash-input-element::selection,
.dash-input-element::-webkit-selection {
    color: var(--Dash-Fill-Inverse-Strong);
    background: var(--Dash-Fill-Interactive-Strong);
}

.dash-input-element:disabled {
    cursor: not-allowed;
}

/* Hide native steppers for number inputs */
.dash-input-element[type='number'] {
    -moz-appearance: textfield;
    border-radius: 0;
}

.dash-input-element[type='number']::-webkit-outer-spin-button,
.dash-input-element[type='number']::-webkit-inner-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Show native steppers when container is narrow and input is number type */
@container (max-width: 99px) {
    .dash-input-element[type='number'] {
        -moz-appearance: number-input;
    }

    .dash-input-element[type='number']::-webkit-outer-spin-button,
    .dash-input-element[type='number']::-webkit-inner-spin-button {
        -webkit-appearance: inner-spin-button;
        margin: 0;
    }
}

/* Stepper button base styles */
.dash-input-stepper {
    display: flex;
    align-items: center;
    justify-content: center;
    width: 32px;
    height: 100%;
    border: none;
    background: var(--Dash-Fill-Inverse-Strong);
    cursor: pointer;
    font-size: 16px;
    font-weight: bold;
    color: var(--Dash-Text-Primary);
}

.dash-input-stepper:hover,
.dash-input-stepper:focus {
    background: var(--Dash-Fill-Primary-Hover);
}

.dash-input-stepper:active {
    background: var(--Dash-Fill-Primary-Active);
}

.dash-input-stepper:disabled {
    background: var(--Dash-Fill-Inverse-Strong);
    opacity: 0.5;
    cursor: default;
}

@container (max-width: 99px) {
    .dash-input-stepper {
        display: none;
    }
}

/* Decrement button specific styles */
.dash-input-stepper.dash-stepper-decrement {
    border-right: 1px solid var(--Dash-Stroke-Weak);
    border-radius: var(--Dash-Spacing) 0 0 var(--Dash-Spacing);
    order: 1;
}

/* Increment button specific styles */
.dash-input-stepper.dash-stepper-increment {
    border-left: 1px solid var(--Dash-Stroke-Weak);
    border-radius: 0 var(--Dash-Spacing) var(--Dash-Spacing) 0;
    order: 3;
}

/* Hidden input type */
.dash-input-container.dash-input-hidden {
    display: none;
}

input.dash-input-element:invalid {
    color: red;

    position: relative;
    z-index: 0;
    display: flex;
    align-items: center;
    user-select: none;
    touch-action: none;
    width: 100%;
    height: 14px;
    padding: 17px 0 17px 0;
    box-sizing: border-box;
    /* Override Radix's default margin/padding behavior */
    --radix-slider-thumb-width: 16px;
}

.dash-slider-root.has-marks {
    padding: 6px 0 28px 0;
}

.dash-slider-root[data-orientation='vertical'].has-marks {
    padding-bottom: 0px;
}

.dash-slider-root[data-orientation='vertical'] {
    flex-direction: column;
    width: 20px;
    height: 100%;
}

.dash-slider-track {
    position: relative;
    flex-grow: 1;
    border-radius: 9999px;
    height: 4px;
    background-color: var(--Dash-Fill-Disabled);
}

.dash-slider-root[data-orientation='vertical'] .dash-slider-track {
    width: 4px;
    height: auto;
    overflow-y: hidden;
}

.dash-slider-range {
    position: absolute;
    border-radius: 9999px;
    height: 100%;
    background-color: var(--Dash-Fill-Interactive-Strong);
}

.dash-slider-root[data-orientation='vertical'] .dash-slider-range {
    width: 100%;
    height: auto;
}

.dash-slider-thumb {
    position: relative;
    z-index: 1;
    display: block;
    width: 16px;
    height: 16px;
    background-color: var(--Dash-Fill-Interactive-Strong);
    border: 2px solid var(--Dash-Fill-Inverse-Strong);
    border-radius: 50%;
    box-shadow: 0 1px 3px 0 var(--Dash-Shading-Weak);
    cursor: pointer;
    outline: none;
    transition: all 0.15s ease-in-out;
}

.dash-slider-thumb:focus,
.dash-slider-thumb:hover {
    transform: scale(1.125); /* Scale to make 16px thumb appear as 18px */
    box-shadow: 0 4px 6px -1px var(--Dash-Shading-Weak);
}

.dash-slider-thumb:focus {
    outline: 2px solid var(--Dash-Fill-Interactive-Strong);
}

.dash-slider-thumb:focus .dash-slider-tooltip,
.dash-slider-thumb:hover .dash-slider-tooltip {
    display: block;
}

.dash-slider-thumb[data-disabled],
.dash-range-slider-input:disabled {
    cursor: not-allowed;
    opacity: 0.5;
}

.dash-slider-mark {
    position: absolute;
    font-size: 12px;
    height: 12px;
    line-height: 12px;
    color: var(--Dash-Text-Strong);
    white-space: nowrap;
    pointer-events: none;
}

.dash-slider-mark-outside-selection {
    color: var(--Dash-Text-Disabled);
}

.dash-slider-mark:before {
    content: '';
    position: absolute;
    bottom: 100%;
    left: 50%;
    transform: translateX(-50%);
    background-color: var(--Dash-Fill-Disabled);
    width: 4px;
    height: 6px;
    border-radius: 2px;
    margin-bottom: 2px;
}
.dash-slider-mark.with-dots:before {
    content: initial;
}

.dash-slider-root[data-orientation='vertical'] .dash-slider-mark:before {
    content: initial;
}

.dash-slider-dot {
    pointer-events: none;
    position: absolute;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background-color: var(--Dash-Fill-Primary-Active);
}

.dash-slider-dot-outside-selection {
    background-color: var(--Dash-Fill-Disabled);
}

.dash-slider-tooltip {
    display: none;
    position: absolute;
    border-radius: var(--Dash-Spacing);
    padding: calc(var(--Dash-Spacing) * 3);
    font-size: 12px;
    line-height: 1;
    box-shadow: 0 0 8px var(--Dash-Shading-Strong);
    background-color: var(--Dash-Fill-Inverse-Strong);
    user-select: none;
    z-index: 1000;
    fill: var(--Dash-Fill-Inverse-Strong);
}

.dash-slider-tooltip.always-visible {
    display: block;
}

/* Include property to mimic rc-slider behavior */
.dash-slider-root:not([data-included='false']) .dash-slider-range {
    background-color: var(--Dash-Fill-Interactive-Strong);
}

.dash-slider-root[data-included='false'] .dash-slider-range {
    background-color: transparent;
}

/* Disabled state */
.dash-slider-root[data-disabled] {
    opacity: 0.5;
    cursor: not-allowed;
}

.dash-slider-root[data-disabled] .dash-slider-track {
    background-color: var(--Dash-Fill-Disabled);
}

.dash-slider-root[data-disabled] .dash-slider-range {
    background-color: var(--Dash-Fill-Disabled);
}

.dash-slider-root[data-disabled] .dash-slider-thumb {
    cursor: not-allowed;
    border-color: var(--Dash-Fill-Disabled);
}

.dash-slider-container {
    display: flex;
    align-items: center;
    gap: 16px;
    width: 100%;
    container-type: inline-size;
}

.dash-slider-wrapper {
    flex: 1;
    min-width: 0;
}

.dash-range-slider-inputs {
    display: flex;
    flex-direction: column;
    gap: 4px;
    min-width: 64px;
}

.dash-range-slider-min-input {
    text-align: center;
}

.dash-range-slider-max-input {
    order: 1;
}

.dash-range-slider-input {
    min-width: 5cqw; /* 5% of container width */
    max-width: 25cqw; /* 25% of container width */
    text-align: center;
    -webkit-appearance: textfield;
    -moz-appearance: textfield;
    appearance: textfield;
    font-family: inherit;
    font-size: inherit;
    box-sizing: content-box;
    height: 30px;
}

.dash-range-slider-input:only-of-type {
    max-width: 33cqw;
}

.dash-range-slider-input::selection,
.dash-range-slider-input::-webkit-selection {
    color: var(--Dash-Fill-Inverse-Strong);
    background: var(--Dash-Fill-Interactive-Strong);
}

.dash-range-slider-input:focus {
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

/* Hide the number input spinners */
.dash-range-slider-input::-webkit-inner-spin-button,
.dash-range-slider-input::-webkit-outer-spin-button {
    -webkit-appearance: none;
    margin: 0;
}

/* Hide inputs on small containers using container queries */
/* single slider input */
@container (max-width: 200px) {
    .dash-slider-container .dash-range-slider-input:only-of-type {
        display: none;
    }
}

/* range slider inputs */
@container (max-width: 300px) {
    .dash-slider-container .dash-range-slider-min-input,
    .dash-slider-container .dash-range-slider-max-input {
        display: none;

.tab-parent {
    display: flex;
    flex-direction: column;
    overflow: hidden;
}

/* Tab container (holds all tabs) */
.tab-container {
    display: flex;
    flex-direction: column;
}

.tab-container--vert {
    display: inline-flex;
}

/* Individual tab */
.tab {
    flex: 1 1 0;
    min-width: 0;
    background-color: var(--tabs-background);
    border: 1px solid var(--tabs-border);
    border-bottom: none;
    padding: 20px 25px;
    transition: background-color, color 200ms;
    text-align: center;
    box-sizing: border-box;
    cursor: pointer;
}

/* Tab selected state */
.tab--selected {
    border-top: 2px solid var(--tabs-primary);
    color: var(--Dash-Text-Primary);
    background-color: var(--Dash-Fill-Inverse-Strong);
}

.tab--selected:hover {
    background-color: var(--Dash-Fill-Inverse-Strong);
}

.tab--disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

/* Tab content area */
.tab-content--vert {
    display: inline-flex;
    flex-direction: column;
}

/* Desktop/tablet styles (when above breakpoint) */
.tab-parent--above-breakpoint .tab {
    border: 1px solid var(--tabs-border);
    border-right: none;
}

.tab-parent--above-breakpoint .tab:last-child {
    border-right: 1px solid var(--tabs-border);
    border-bottom: 1px solid var(--tabs-border);
}

.tab-parent--above-breakpoint .tab--selected,
.tab-parent--above-breakpoint .tab:last-child.tab--selected {
    border-bottom: none;
}

/* Vertical tabs: left border for selected */
.tab-parent--above-breakpoint .tab-container--vert .tab--selected {
    border-left: 2px solid var(--tabs-primary);
}

/* Horizontal tabs: top border for selected */
.tab-parent--above-breakpoint
    .tab-container:not(.tab-container--vert)
    .tab--selected,
.tab-parent--above-breakpoint
    .tab-container:not(.tab-container--vert)
    .tab:last-child.tab--selected {
    border-top: 2px solid var(--tabs-primary);
}

.tab-parent--above-breakpoint .tab-container--vert .tab {
    width: auto;
    border-right: none !important;
    border-bottom: none !important;
}

.tab-parent--above-breakpoint .tab-container--vert .tab:last-child {
    border-bottom: 1px solid var(--tabs-border) !important;
}

.tab-parent--above-breakpoint .tab-container--vert .tab--selected {
    border-top: 1px solid var(--tabs-border);
    border-left: 2px solid var(--tabs-primary);
    border-right: none;
}

.tab-parent--above-breakpoint .tab-container {
    flex-direction: row;
}

.tab-parent--above-breakpoint .tab-container--vert {
    flex-direction: column;
}

.tab-parent--above-breakpoint.tab-parent--vert {
    display: inline-flex;
    flex-direction: row;
}

    display: block;
    flex: 1;
    box-sizing: border-box;
    padding: 0;
    background: var(--Dash-Fill-Inverse-Strong);
    border: none;
    outline: none;
    width: 100%;
    cursor: pointer;
    font-family: inherit;
    font-size: inherit;
    overflow: hidden;
    accent-color: var(--Dash-Fill-Interactive-Strong);
    outline-color: var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-grid-container {
    display: grid;
    grid-template-columns: auto 1fr;
    justify-items: start;
    align-items: center;
    gap: calc(var(--Dash-Spacing) * 2);
}

.dash-dropdown-grid-container:has(> :nth-child(3)) {
    grid-template-columns: auto 1fr auto;
}

.dash-dropdown-grid-container:has(> :nth-child(4)) {
    grid-template-columns: auto 1fr auto auto;
}

.dash-dropdown,
.dash-dropdown-content {
    border-radius: var(--Dash-Spacing);
    border: 1px solid var(--Dash-Stroke-Strong);
    color: inherit;
    text-align: left;
}

.dash-dropdown-trigger {
    padding: 0 12px;
    min-height: 32px;
    height: 100%;
}

.dash-dropdown:focus {
    border: 1px solid var(--Dash-Fill-Interactive-Strong);
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown:disabled {
    opacity: 0.6;
    cursor: not-allowed;
}

.dash-dropdown-focus-target {
    position: absolute;
    opacity: 0;
    pointer-events: none;
}

.dash-dropdown-value {
    max-width: 100%;
    text-align: left;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.dash-dropdown-placeholder {
    color: var(--Dash-Text-Disabled);
}

.dash-dropdown-value > * {
    display: inline;
}

.dash-dropdown-value-item:not(:first-child)::before {
    content: ', ';
}

.dash-dropdown-content {
    background: var(--Dash-Fill-Inverse-Strong);
    width: fit-content;
    min-width: var(--radix-popover-trigger-width);
    max-width: 98vw;
    overflow-y: auto;
    z-index: 500;
    box-shadow: 0px 10px 38px -10px var(--Dash-Shading-Strong),
        0px 10px 20px -15px var(--Dash-Shading-Weak);
    overscroll-behavior: contain;
}

.dash-dropdown-value-count,
.dash-dropdown-trigger-icon {
    color: var(--Dash-Text-Strong);
    fill: var(--Dash-Text-Strong);
    white-space: nowrap;
    justify-self: end;
}

.dash-dropdown-trigger-icon {
    transition: transform 0.15s;
}

[data-state='open'] .dash-dropdown-trigger-icon {
    transform: rotate(180deg);
}

.dash-dropdown-value-count {
    line-height: 18px;
    padding: 4px;
    border-radius: 4px;
    color: var(--Dash-Text-Weak);
    background: var(--Dash-Fill-Interactive-Weak);
    font-size: 0.875em;
}

.dash-dropdown-search-container {
    position: sticky;
    top: calc(var(--Dash-Spacing) * 2);
    margin: calc(var(--Dash-Spacing) * 2);
    padding: var(--Dash-Spacing);
    border-radius: 4px;
    border: 1px solid var(--Dash-Stroke-Strong);
    background: var(--Dash-Fill-Inverse-Strong);
}

.dash-dropdown-search-container:focus-within {
    border-color: var(--Dash-Fill-Interactive-Strong);
    outline: 1px solid var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-search-icon,
.dash-dropdown-clear {
    width: 1em;
    height: 1em;
}

.dash-dropdown-search-container:focus-within .dash-dropdown-search-icon {
    color: var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-clear {
    background: none;
    border: none;
    cursor: pointer;
    padding: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    justify-self: end;
    color: var(--Dash-Text-Strong);
}

.dash-dropdown-clear:hover {
    color: var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-clear:focus {
    outline: 2px solid var(--Dash-Fill-Interactive-Strong);
    outline-offset: 1px;
    border-radius: 2px;
}

.dash-dropdown-search {
    line-height: calc(var(--Dash-Spacing) * 6);
    width: 100%;
    border: none;
    background: transparent;
    color: var(--Dash-Text-Strong);
    outline: none;
    padding: 0;
    font-family: inherit;
    font-size: inherit;

    /* Hide the "x" clear button in search inputs */
    &::-webkit-search-cancel-button {
        -webkit-appearance: none;
        appearance: none;
        display: none;
    }

    &::-ms-clear {
        display: none;
    }
}

.dash-dropdown-actions {
    display: flex;
    gap: calc(var(--Dash-Spacing) * 6);
    line-height: 18px;
    padding: var(--Dash-Spacing) calc(var(--Dash-Spacing) * 3);
    border-top: 1px solid var(--Dash-Fill-Disabled);
    border-bottom: 1px solid var(--Dash-Fill-Disabled);
}

.dash-dropdown-action-button {
    background: none;
    border: none;
    cursor: pointer;
    font-family: inherit;
    font-size: 0.875em;
    font-weight: 600;
    padding: 0;
    text-decoration: none;
    color: var(--Dash-Text-Weak);
    white-space: nowrap;
    accent-color: var(--Dash-Fill-Interactive-Strong);
    outline-color: var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-action-button:hover {
    color: var(--Dash-Fill-Interactive-Strong);
}

.dash-dropdown-action-button:focus {
    text-decoration: underline;
}

.dash-dropdown-options {
    overflow-y: auto;
}

.dash-dropdown-content:has(.dash-options-list-virtualized) {
    overflow-y: hidden;
    display: flex;
    flex-direction: column;
}

.dash-dropdown-options:has(.dash-options-list-virtualized) {
    overflow-y: visible;
    flex: 1;
    min-height: 0;
}

.dash-dropdown-option {
    padding: calc(var(--Dash-Spacing) * 2) calc(var(--Dash-Spacing) * 3);
    box-shadow: 0 -1px 0 0 var(--Dash-Fill-Disabled) inset;
}

.dash-dropdown-option
    .dash-options-list-option-wrapper:has(input[type='radio']) {
    /* radio buttons are used in single-select dropdowns to aid keyboard
     * selection and screen readers, but visually, they are hidden
     */
    width: 0;
    overflow: hidden;
}

/* Positioning container for the dropdown */
.dash-dropdown-wrapper {

    white-space: nowrap;
    gap: 6px;
    cursor: pointer;
    border: none;
    background: none;
    outline: none;
    display: flex;
    align-items: center;
}

.dash-debug-menu__popup {
    display: flex;
    flex-direction: column;
    position: absolute;
    bottom: 100%;
    right: 0;
    gap: 8px;
    max-height: calc(100vh - 75px);
    justify-content: flex-end;
}

.dash-debug-menu__version-opt-out {
    display: flex;
    width: 426px;
    padding: 16px;
    flex-direction: column;
    align-items: flex-start;
    gap: 8px;
    border-radius: 8px;
    border: 1px solid rgba(0, 24, 102, 0.1);
    background: #fff;
    align-self: flex-end;
    position: relative;

    box-shadow: 0px 0.7px 1.4px 0px rgba(0, 0, 0, 0.07),
        0px 1.9px 4px 0px rgba(0, 0, 0, 0.05),
        0px 4.5px 10px 0px rgba(0, 0, 0, 0.05);
}

.dash-debug-menu__version-opt-out__text {
    display: inline-block;
}

.dash-debug-menu__version-opt-out__text a {
    color: #7f4bc4;
    text-decoration: none;
}

.dash-debug-menu__version-opt-out__text span {
    margin-right: 5px;
}

.dash-debug-menu__version-opt-out button {
    display: flex;
    height: 24px;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    border-radius: 4px;
    cursor: pointer;
    line-height: 18px;
    padding: 16px 12px;
}

.dash-debug-menu__version-opt-out__buttons-container {
    display: flex;
    gap: 8px;
    align-self: stretch;
    justify-content: center;
    padding-top: 16px;
    margin-top: 16px;
    border-top: 1px solid rgba(0, 24, 102, 0.1);
}

.dash-debug-menu__version-opt-out__button-primary {
    border: none;
    color: #fff;
    background: #7f4bc4;
}

.dash-debug-menu__version-opt-out__button-secondary {
    background: rgba(161, 89, 255, 0.05);
    color: #7f4bc4;
    border: 1px solid rgba(134, 74, 212, 0.8);
}

.dash-debug-menu:hover {
    background-color: #7f4bc4;
}

.dash-debug-menu__outer {
    transition: 0.3s;
    box-sizing: border-box;
    position: fixed;
    bottom: -1px;
    right: -1px;
    display: flex;
    color: black;
    flex-direction: row;
    font-family: Verdana, sans-serif !important;
    font-size: 14px;
    justify-content: flex-end;
    align-items: center;
    z-index: 10000;
    border-radius: 5px 0 0 0;
    padding: 15px 0;
    background-color: #f5f6fa;
    box-shadow: 0px 0.8px 0.8px 0px rgba(0, 0, 0, 0.04),
        0px 2.3px 2px 0px rgba(0, 0, 0, 0.03);
    border: 1px solid rgba(0, 24, 102, 0.1);
}
.dash-debug-menu__outer.dash-debug-menu__outer--collapsed {
    max-width: 50px;
}
.dash-debug-menu__outer.dash-debug-menu__outer--expanded {
    max-width: calc(100vw - 50px);
}

.dash-debug-menu__upgrade-tooltip {
    position: absolute;
    bottom: calc(100% + 12px);
    right: 0;
    display: flex;
    flex-direction: column;
    background-color: white;
    border-radius: 6px;
    border: 1px solid #0018661a;
    padding: 11px;
    box-shadow: 0px 0px 14px 5px #00000012;
    z-index: 1200;
}

.dash-debug-menu__toggle {
    color: #7f4bc4;
    transition: 0.3s;
}
.dash-debug-menu__toggle--expanded {
    transform: rotate(180deg);
}
.dash-debug-menu__error-indicator {
    width: 8px;
    height: 8px;
    background-color: #DC3E42;
    border-radius: 100%;
    position: absolute;
    right: 3px;
    top: 13px;
}
.dash-debug-menu__status {
    display: flex;
    align-items: center;
    gap: 6px;
}

.dash-debug-menu__content {
    display: flex;
    align-items: stretch;
    margin-left: 15px;
    transition: all 0.5s ease;
    flex-shrink: 0;
}

.dash-debug-menu__version {
    position: relative;
    display: flex;
    align-items: center;
}

.dash-debug-menu__divider {
    width: 1.5px;
    height: 26px;
    margin: 0px 13px;
    background-color: #0015594d;
}

.dash-debug-menu__button {
    background: none;
    border: none;
    box-shadow: 0 1px #d3dae6;
    display: flex;
    justify-content: center;
    align-items: center;
    transition: background-color 0.2s;
    font-family: Verdana, sans-serif !important;
    color: #7f4bc4;
}

.dash-debug-menu__button.dash-debug-menu__button--selected {
    color: #7f4bc4;
    box-shadow: 0 2px #7f4bc4;
}
.dash-debug-menu__button.dash-debug-menu__button--selected:hover {
    color: #5806c4;
}

.dash-debug-alert {
    display: flex;
    align-items: center;
    font-size: 10px;
}

.dash-debug-alert-label {
    display: flex;
    position: fixed;
    bottom: 81px;
    right: 29px;
    z-index: 10002;
    cursor: pointer;
    box-shadow: 0px 0px 1px rgba(0, 0, 0, 0.25),
        0px 1px 3px rgba(162, 177, 198, 0.32);
    border-radius: 32px;
    background-color: white;
    padding: 4px;
    color: rgb(50, 50, 50);
}

.dash-debug-menu__error-count {
    font-size: 12px;
    color: #fff;
    background-color: #c73a3a;
    padding: 3px 5px;
    border-radius: 3px;
}

.dash-debug-disconnected {
    font-size: 14px;
    margin-left: 3px;
}
.dash-debug-menu__icon {
    color: #9ca3af;
}
.dash-debug-menu__button:hover .dash-debug-menu__icon {
    color: #5806c4;
}

    padding: 0 10px;
    font-family: Courier;
}

.dash-fe-error__icon-x {
    position: absolute;
    right: 0;
    top: 0;
    color: #b9c2ce;
    font-size: 20px;
    cursor: pointer;
}

.dash-fe-error__icon-x:hover {
    color: #a1a9b5;
}

.dash-fe-errors {
    min-width: 386px;
    max-width: 650px;
    max-height: 450px;
    display: inline-block;
}

.dash-fe-error__icon-error {
    width: 20px;
    height: 20px;
    display: inline-block;
    margin-right: 16px;
}
.dash-fe-error__icon-close {
    width: 10px;
    height: 10px;
    position: absolute;
    right: 12px;
    top: 12px;
    display: inline-block;
}
.dash-fe-error__icon-arrow {
    width: 8px;
    height: 28px;
    margin: 0px 8px;
}
.dash-fe-error-top__group:first-child {
    /*
     * 77% is the maximum space allowed based off of the other elements
     * in the top part of the error container (timestamp & collapse arrow).
     * this was manually determined */
    width: 77%;
}
.dash-fe-error-top__group {
    display: inline-flex;
    align-items: center;
}
.dash-fe-error__title {
    text-align: left;
    margin: 0px;
    margin-left: 5px;
    padding: 0px;
    font-size: 12.6px;
    display: inline-block;
    text-overflow: ellipsis;
    white-space: nowrap;
    overflow: hidden;
    line-height: 20px;
}
.dash-fe-error__timestamp {
    margin-right: 20px;
}
.dash-fe-error__collapse--flipped {
    -webkit-transform: rotate(180deg);
    -ms-transform: rotate(180deg);
    transform: rotate(180deg);
}

.dash-fe-error__info_title {
    margin: 0;
    color: #506784;
    font-size: 16px;
    background-color: #f3f6fa;
    border: 2px solid #dfe8f3;
    box-sizing: border-box;
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
    padding: 10px;
}

.dash-fe-error__info {
    border: 1px solid #dfe8f3;
    margin: 0 0 1em 0;
    padding: 10px;

    background-color: white;
    border: 2px solid #dfe8f3;
    color: #506784;
    overflow: auto;
    white-space: pre-wrap;
}

.dash-fe-error__curved {
    border-radius: 4px;
}

.dash-fe-error__curved-top {
    border-top-left-radius: 4px;
    border-top-right-radius: 4px;
    border-bottom-width: 0px;
}

.dash-fe-error__curved-bottom {
    border-radius-bottom-left: 4px;
    border-radius-bottom-right: 4px;
    background-color: #ffefef;
}

.dash-be-error__st {
    background-color: #fdf3f4;
    min-width: 386px;
    max-width: 650px;
    /* iframe container handles the scrolling */
    overflow: hidden;
    display: inline-block;
}

.dash-be-error__str {
    background-color: #f5f6fa;
    min-width: 386px;
    width: 100%;
    overflow: auto;
    line-height: 17px;
    margin-bottom: 8px;
}

.dash-backend-error {
    padding: 8px;
}

.dash-error-menu {
    max-width: 50%;
    max-height: 60%;
    display: contents;
    font-family: monospace;
    font-size: 14px;
    font-variant-ligatures: common-ligatures;
    color: rgb(50, 50, 50);
}

.dash-error-card {
    box-sizing: border-box;
    display: inline-block;
    /* shadow-1 */
    border-radius: 4px;
    animation: dash-error-card-animation 0.5s;
    padding: 24px;
    text-align: left;
    background: transparent;
    width: 100%;
}
.dash-error-card--alerts-tray {
    position: absolute;
    top: -300px;
    left: -1px;
    animation: none;
    box-shadow: none;
    border: 1px solid #ececec;
    border-bottom: 0;
    border-bottom-left-radius: 0px;
    border-bottom-right-radius: 0px;
    width: 422px;
}
.dash-error-card--container {
    padding: 16px;
    width: 600px;
    max-width: 800px;
    margin-bottom: 4px;
    background-color: white;
    overflow: auto;
    border-radius: 6px;
    box-shadow: 0px 0.7px 1.4px 0px rgba(0, 0, 0, 0.07),
        0px 1.9px 4px 0px rgba(0, 0, 0, 0.05),
        0px 4.5px 10px 0px rgba(0, 0, 0, 0.05);
}

.dash-error-card__topbar {
    width: 100%;
    height: 32px;
    display: flex;
    justify-content: flex-start;
    font-size: 14px;
    align-items: center;
    position: relative;
    padding-bottom: 14px;
    font-weight: 700;
}
.dash-error-card__message {
    font-size: 14px;
}

.dash-error-card__message > strong {
    color: #ff4500;
}

.dash-error-card__content {
    box-sizing: border-box;
    background-color: white;
    border-radius: 2px;
    margin-bottom: 15px;
    border: 1px solid #0018661a;
    font-size: 12.6px;
}

.dash-fe-error-item {
    background: #ffffff;
    border-radius: 2px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px;
    cursor: pointer;
}

@keyframes dash-error-card-animation {
    from {
        opacity: 0;
        -webkit-transform: scale(1.1);
        -moz-transform: scale(1.1);
        -ms-transform: scale(1.1);
        transform: scale(1.1);
    }
    to {
        opacity: 1;
        -webkit-transform: scale(1);
        -moz-transform: scale(1);
        -ms-transform: scale(1);
        transform: scale(1);
    }
}

.plotly-cloud-modal-overlay {
    position: absolute;
    bottom: 100%;
    left: -1px;
    z-index: 10000;
}

.plotly-cloud-modal-content {
    border-radius: 8px;
    width: 522px;
    background: white;
    border: 1px solid #d1d5db;
    border-radius: 4px 4px 0 0;
    box-shadow: 0 -4px 6px rgba(0, 0, 0, 0.08);
    overflow: hidden;
}

.plotly-cloud-modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 16px 20px;
    border-bottom: 1px solid #e5e5e5;
    background: #f9fafb;
}

.plotly-cloud-modal-header h3 {
    margin: 0;
    color: #333;
}

.plotly-cloud-modal-close {
    background: none;
    border: none;
    font-size: 24px;
    cursor: pointer;
    color: #666;
    padding: 0;
    width: 30px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.plotly-cloud-modal-close:hover {
    color: #333;
}

.plotly-cloud-modal-body {
    padding: 20px;
    color: black !important;
    font-weight: 100;
}
button.plotly-cloud-modal-button {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 6px 10px !important;
    border-radius: 4px !important;
    font-size: 12px !important;
    font-weight: 600 !important;
    cursor: pointer;
    border: 1px solid transparent;
    background: #8b5cf6;
    color: white;
    border-color: #7c3aed;
}

.plotly-cloud-modal-button:disabled {
    cursor: not-allowed;
}
.plotly-cloud-copy-install {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 8px 10px;
    background: #f9fafb;
    border: 1px solid #e5e7eb;
    border-radius: 6px;
    margin-top: 8px;
